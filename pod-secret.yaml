apiVersion: v1
kind: Pod

metadata:
  name: nginx-secret

spec:
  containers:
    - name: nginx
      image: nginx

      env:
        - name: DB_USERNAME
          valueFrom:
            secretKeyRef:
              name: app-secret
              key: username

        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: app-secret
              key: password